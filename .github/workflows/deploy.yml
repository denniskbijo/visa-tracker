name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build and deploy to Oracle Cloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build amd64 binary
        run: GOOS=linux GOARCH=amd64 go build -o visa-tracker ./cmd/server

      - name: Stop service before replacing binary
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: sudo systemctl stop visa-tracker || true

      - name: Deploy files to VM
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: "visa-tracker,data/,static/,internal/templates/"
          target: /opt/visa-tracker
          overwrite: true

      - name: Start service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            sudo systemctl start visa-tracker
            sleep 3
            sudo systemctl is-active visa-tracker
