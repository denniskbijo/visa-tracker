name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build and deploy to Oracle Cloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build ARM64 binary
        run: GOOS=linux GOARCH=arm64 go build -o visa-tracker ./cmd/server

      - name: Deploy files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: "visa-tracker,data/,static/,internal/templates/"
          target: /opt/visa-tracker
          overwrite: true

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            sudo systemctl restart visa-tracker
            sleep 3
            sudo systemctl is-active visa-tracker
