visa_routes:
  - slug: skilled-worker
    name: Skilled Worker
    description: >
      The main work visa route. Requires a licensed sponsor, a job offer in an eligible
      SOC code, and a salary meeting the general or going-rate threshold.
    requires_sponsor: true
    requires_endorsement: false
    salary_threshold_pence: 3870000   # £38,700/yr general threshold
    duration_years: 5

  - slug: global-talent
    name: Global Talent
    description: >
      For leaders and emerging talent in tech, science, engineering, arts, and humanities.
      Requires endorsement from a designated body (e.g. Tech Nation, UKRI). No sponsor
      or salary floor needed.
    requires_sponsor: false
    requires_endorsement: true
    salary_threshold_pence: 0
    duration_years: 5

  - slug: high-potential-individual
    name: High Potential Individual
    description: >
      For graduates of top global universities (as listed by the Home Office). Two-year
      visa with no sponsor required. Cannot be extended — switch to another route.
    requires_sponsor: false
    requires_endorsement: false
    salary_threshold_pence: 0
    duration_years: 2

  - slug: scale-up
    name: Scale-up
    description: >
      For workers joining qualifying high-growth companies. Requires sponsor for the first
      6 months, then free to change employers. Salary threshold £36,300/yr.
    requires_sponsor: true
    requires_endorsement: false
    salary_threshold_pence: 3630000   # £36,300/yr
    duration_years: 2

  - slug: intra-company-transfer
    name: Senior or Specialist Worker (ICT)
    description: >
      For multinational companies transferring established employees to a UK branch.
      Requires sponsor and a minimum salary. Previously called Intra-Company Transfer.
    requires_sponsor: true
    requires_endorsement: false
    salary_threshold_pence: 4820000   # £48,200/yr
    duration_years: 5

  - slug: graduate
    name: Graduate
    description: >
      Two-year post-study work visa for graduates of UK universities. No sponsor needed,
      no salary threshold, no job offer required. Often used as a bridge to Skilled Worker.
    requires_sponsor: false
    requires_endorsement: false
    salary_threshold_pence: 0
    duration_years: 2

